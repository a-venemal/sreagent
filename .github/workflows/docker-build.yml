name: Build & Push Docker Image

# 触发条件：
#   1. push 到 main 分支 → 打 :latest 标签
#   2. 推送 v* 格式的 tag  → 打 :v1.2.3 及 :latest 标签
#   3. PR 到 main         → 仅构建，不推送（CI 验证）
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  # 替换为你的 Docker Hub 用户名/镜像名
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/sreagent

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Go 单元测试（可按需扩展）
  # ──────────────────────────────────────────────────────────
  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -timeout 120s

  # ──────────────────────────────────────────────────────────
  # Job 2: 前端 TypeScript 类型检查
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npm run typecheck
        working-directory: web

  # ──────────────────────────────────────────────────────────
  # Job 3: 构建多架构镜像并推送到 Docker Hub
  #         仅在 push 到 main 或 push tag 时执行
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    # PR 时只 build 不 push
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 启用 QEMU 以支持 arm64 交叉编译
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 使用 BuildKit（支持多平台、缓存）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 仅在非 PR 时登录 Docker Hub
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 自动生成镜像标签：
      #   main 分支 push → :latest
      #   v1.2.3 tag     → :v1.2.3, :1.2, :1, :latest
      #   PR             → :pr-123（仅构建不推送）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          # PR 时只 build 不 push
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 使用 GitHub Actions 缓存加速二次构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}

      # 推送后在 Docker Hub 更新描述（可选）
      - name: Update Docker Hub description
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: README.md
        continue-on-error: true  # README 不存在时不中断流水线
