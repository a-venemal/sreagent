<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sreg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1fc47a"/>
      <stop offset="1" stop-color="#0d6e3e"/>
    </linearGradient>
    <linearGradient id="sreh" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- rounded badge -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#sreg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#sreh)"/>
  <!-- radar pulse rings -->
  <circle cx="32" cy="32" r="21" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="14" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.5"/>
  <!-- stylized S (SRE monogram) -->
  <path d="M41 23 C41 18 36.5 16 32 16 C26.5 16 22 19 22 23 C22 27 26 29 32 30 C38 31 42 33 42 38 C42 43 37.5 46 32 46 C26.5 46 22 43 22 39"
        stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" fill="none"/>
  <!-- alert accent dot -->
  <circle cx="49" cy="15" r="3.8" fill="#f59e0b" stroke="#ffffff" stroke-width="1.4"/>
</svg>
