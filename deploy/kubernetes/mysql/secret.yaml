# =============================================================================
# MySQL Secret
# 使用前请替换为真实密码（推荐使用 Sealed Secrets 或 External Secrets）
# 生成 base64: echo -n 'your_password' | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: sreagent
  labels:
    app: mysql
type: Opaque
stringData:
  # 直接写明文，K8s 会自动 base64 编码存储
  root-password: "SREAgent_Root_2026!"
  username: "sreagent"
  password: "SREAgent_DB_2026!"
  database: "sreagent"
