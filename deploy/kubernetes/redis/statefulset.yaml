# =============================================================================
# Redis StatefulSet + Service
# 单实例 Redis，带持久化（AOF + RDB）
# 生产环境如需高可用请使用 Redis Sentinel 或 Redis Cluster
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sreagent
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: sreagent
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis

          # 启用密码认证、持久化（AOF + RDB）
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --save
            - "900 1"
            - --save
            - "300 10"
            - --save
            - "60 10000"
            - --dir
            - /data
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password

          volumeMounts:
            - name: redis-data
              mountPath: /data

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: [ReadWriteOnce]
        # storageClassName: standard
        resources:
          requests:
            storage: 5Gi
