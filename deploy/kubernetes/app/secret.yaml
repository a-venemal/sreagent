# =============================================================================
# SREAgent 应用 Secret
# 仅存储启动必需的敏感配置：数据库密码、Redis 密码、JWT Secret、加密主密钥
# AI 和 Lark Bot 配置已移至数据库，通过 Web UI → Settings 页面配置
# 生产环境推荐使用 Sealed Secrets / External Secrets Operator
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: sreagent-secret
  namespace: sreagent
  labels:
    app: sreagent
type: Opaque
stringData:
  # 数据库密码（对应 SREAGENT_DATABASE_PASSWORD）
  db-password: "SREAgent_DB_2026!"
  # Redis 密码（对应 SREAGENT_REDIS_PASSWORD）
  redis-password: "SREAgent_Redis_2026!"
  # JWT Secret（对应 SREAGENT_JWT_SECRET，生产请换成随机长字符串：openssl rand -hex 32）
  jwt-secret: "CHANGE_ME_jwt_secret_at_least_32_chars_long"
  # 敏感字段加密主密钥（AES-256-GCM，对应 SREAGENT_SECRET_KEY）
  # 必须是 64 个十六进制字符（32 字节）
  # 生成方法：openssl rand -hex 32
  secret-key: "CHANGE_ME_generate_with_openssl_rand_hex_32"
