# Air hot reload configuration
# Install: go install github.com/air-verse/air@latest

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/sreagent.exe"
  cmd = "go build -o ./tmp/sreagent.exe ./cmd/server"
  delay = 1000
  exclude_dir = ["web", "tmp", "vendor", "deploy", "docs", "scripts", "node_modules"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "./tmp/sreagent.exe --config configs/config.yaml"
  include_dir = []
  include_ext = ["go", "yaml"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
